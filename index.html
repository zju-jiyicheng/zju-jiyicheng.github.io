<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Academic Resume</title>
    <meta
      name="description"
      content="Academic homepage with profile, research overview, selected publications, and news."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div class="wrap">
      <div class="layout">
        <aside class="side" aria-label="Profile summary">
          <section class="card profile-card" aria-labelledby="profile-name">
            <img id="profile-avatar" class="portrait" src="assets/avatar-placeholder.svg" alt="Profile portrait">
            <div class="identity">
              <p class="profile-kicker">Academic Homepage</p>
              <h1 class="name">
                <span id="profile-name">Your Name</span>
                <span id="profile-name-native" class="zh">Your Native Name</span>
              </h1>
              <p class="headline" id="profile-headline">PhD Student @ Your University</p>
            </div>
            <nav class="links" id="contact-list" aria-label="Profile links"></nav>
          </section>
        </aside>

        <main class="main" id="top">
          <section class="module" id="about">
            <h2>About Me</h2>
            <div class="intro-block" id="profile-intro"></div>

            <div class="interest-block">
              <h3>Research Interests</h3>
              <div class="chips" id="interest-list"></div>
            </div>
          </section>

          <section class="module overview-module" id="overview">
            <h2>Research Overview</h2>
            <p class="overview-title" id="overview-title">A Line of Work on Speculative Decoding for Video LLMs</p>
            <div class="overview-media">
              <img id="overview-image" src="assets/vlm_spec.png" alt="Research overview teaser">
            </div>
          </section>

          <section class="module more-module" id="more-about-me" hidden>
            <h2>More About Me</h2>
            <p class="more-copy" id="more-about-copy"></p>
            <div class="more-gallery" id="more-about-gallery"></div>
          </section>

          <section class="module" id="publications">
            <h2>Publications</h2>
            <div class="publication-list" id="publication-list"></div>
          </section>

          <footer class="site-footer">
            <p id="footer-text">Hosted on GitHub Pages.</p>
          </footer>
        </main>

        <aside class="news-rail" aria-label="News">
          <section class="card news-card">
            <div class="news-head">
              <span class="beat" aria-hidden="true"></span>
              <h2>News</h2>
            </div>
            <div class="nlist">
              <article class="nitem">
                <span class="ndate">Current</span>
                <p class="ntext" id="profile-status"></p>
                <p class="nmeta" id="last-updated"></p>
              </article>
            </div>
          </section>
        </aside>
      </div>
    </div>

    <script src="assets/site-data.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
